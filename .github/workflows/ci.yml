name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: 테스트 및 타입 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 타입 검사
        run: npm run type-check

      - name: 린트
        run: npm run lint

      - name: 테스트 실행
        run: npm run test:coverage

      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  doc-sync-check:
    name: 문서 싱크 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 파일 mtime은 checkout 시점에 따라 migration이 항상 DATA_MODEL보다 "최신"으로 보이는
      # 오탐이 있어, 마지막 git 커밋 시각(epoch)으로 비교한다.
      - name: 마이그레이션-DATA_MODEL 싱크 확인
        run: |
          set -euo pipefail
          MIGRATION_COUNT=$(find supabase/migrations -name "*.sql" | wc -l)
          echo "마이그레이션 파일 수: $MIGRATION_COUNT"
          DOC_TIME=$(git log -1 --format=%ct -- docs/03_DATA_MODEL.md)
          if [ -z "$DOC_TIME" ]; then
            echo "ERROR: docs/03_DATA_MODEL.md git 이력을 찾을 수 없습니다."
            exit 1
          fi
          echo "docs/03_DATA_MODEL.md 마지막 변경 커밋 epoch: $DOC_TIME"
          OUTDATED=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            M_TIME=$(git log -1 --format=%ct -- "$f")
            if [ -z "$M_TIME" ]; then
              echo "ERROR: $f git 이력을 찾을 수 없습니다."
              exit 1
            fi
            if [ "$M_TIME" -gt "$DOC_TIME" ]; then
              echo "OUTDATED_DOC: $f (epoch $M_TIME) 가 DATA_MODEL.md ($DOC_TIME) 보다 이후 커밋에서 수정됨"
              OUTDATED=1
            fi
          done < <(find supabase/migrations -name "*.sql" | sort)
          if [ "$OUTDATED" -ne 0 ]; then
            echo "WARNING: 마이그레이션 변경이 DATA_MODEL.md 갱신보다 최신입니다. docs/03_DATA_MODEL.md 를 함께 업데이트하세요."
            exit 1
          fi

      - name: calculators 함수 테스트 존재 확인
        run: |
          MISSING=0
          for func_file in src/lib/calculators/*.ts; do
            [ -e "$func_file" ] || continue
            func_name=$(basename "$func_file" .ts)
            test_file="src/__tests__/calculators/${func_name}.test.ts"
            if [ ! -f "$test_file" ]; then
              echo "WARNING: 테스트 없음 → $test_file"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: 테스트 없는 계산 함수 ${MISSING}개 발견"
            exit 1
          fi
